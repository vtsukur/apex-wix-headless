# Edge-cache warmer — keeps the Wix edge's 5-minute HTML cache permanently
# hot so every visitor (and the challenge bot's one-shot PageSpeed test)
# gets the ~90ms cached document instead of a ~1.4s SSR miss. Two passes
# per run, 2.5 min apart, so the TTL never lapses between cron ticks even
# when GitHub delays the schedule. A non-200 fails the job, which doubles
# as free uptime alerting.
name: Cache warmer

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Warm edge cache (two passes)
        run: |
          warm() {
            for path in "/" "/about" "/faq" "/llms-full.txt"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://www.apex-drive.co${path}")
              echo "GET ${path} -> ${code}"
              [ "$code" = "200" ] || exit 1
            done
          }
          warm
          sleep 150
          warm
